services:
  postgres:
    image: postgres:16-alpine
    container_name: aramabul-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aramabul
      POSTGRES_USER: aramabul
      POSTGRES_PASSWORD: aramabul
    ports:
      - "5432:5432"
    volumes:
      - aramabul_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aramabul -d aramabul"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  aramabul_pg_data:
