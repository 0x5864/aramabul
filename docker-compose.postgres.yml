services:
  postgres:
    image: postgres:16-alpine
    container_name: neredeyenir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: neredeyenir
      POSTGRES_USER: neredeyenir
      POSTGRES_PASSWORD: neredeyenir
    ports:
      - "5432:5432"
    volumes:
      - neredeyenir_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neredeyenir -d neredeyenir"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neredeyenir_pg_data:
