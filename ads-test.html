<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-adsense-account" content="ca-pub-3016888060216617" />
    <meta name="robots" content="noindex,nofollow" />
    <title>aramabul | AdSense Test</title>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3016888060216617"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
        background: #f6f7fb;
        color: #111827;
      }

      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 8px;
        line-height: 1.5;
      }

      .card {
        margin-top: 20px;
        background: #ffffff;
        border: 1px solid #dbe2ea;
        border-radius: 14px;
        padding: 16px;
      }

      .status {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #eef6ff;
        border: 1px solid #bfdbfe;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        white-space: pre-wrap;
      }

      .ad-box {
        margin-top: 14px;
        min-height: 250px;
        border: 1px dashed #9ca3af;
        border-radius: 10px;
        padding: 10px;
        background: #fafafa;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>AdSense doğrulama sayfası</h1>
      <p>Bu sayfa yalnızca teknik test içindir.</p>
      <p><strong>Client:</strong> ca-pub-3016888060216617</p>
      <p><strong>Slot:</strong> 3244140507</p>

      <section class="card" aria-label="AdSense test kartı">
        <div class="ad-box">
          <ins
            id="adsenseTestUnit"
            class="adsbygoogle"
            style="display: block"
            data-ad-client="ca-pub-3016888060216617"
            data-ad-slot="3244140507"
            data-ad-format="auto"
            data-full-width-responsive="true"
          ></ins>
        </div>
        <div id="statusLog" class="status">Durum: başlatılıyor...</div>
      </section>
    </main>

    <script>
      (() => {
        const logNode = document.getElementById("statusLog");
        const adNode = document.getElementById("adsenseTestUnit");

        const write = (line) => {
          const now = new Date().toLocaleTimeString("tr-TR");
          logNode.textContent += "\n[" + now + "] " + line;
        };

        const params = new URLSearchParams(window.location.search);
        if (params.get("adtest") === "on") {
          adNode.setAttribute("data-adtest", "on");
          write("data-adtest=on etkin.");
        }

        try {
          window.adsbygoogle = window.adsbygoogle || [];
          window.adsbygoogle.push({});
          write("adsbygoogle.push({}) çağrıldı.");
        } catch (error) {
          write("adsbygoogle.push hatası: " + (error && error.message ? error.message : String(error)));
        }

        const observer = new MutationObserver(() => {
          const status = adNode.getAttribute("data-ad-status") || "(yok)";
          write("data-ad-status değişti: " + status);
        });
        observer.observe(adNode, { attributes: true, attributeFilter: ["data-ad-status"] });

        setTimeout(() => {
          const status = adNode.getAttribute("data-ad-status") || "(yok)";
          write("5sn sonra final data-ad-status: " + status);
        }, 5000);
      })();
    </script>
  </body>
</html>
