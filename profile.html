<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2c3531" />
    <title>arama bul | Ayarlar</title>
    <meta name="description" content="Hesap bilgilerin ve uygulama ayarların." />
    <link rel="icon" type="image/png" href="assets/fav.png?v=20260223" />
    <link rel="shortcut icon" type="image/png" href="assets/fav.png?v=20260223" />
    <link rel="apple-touch-icon" href="assets/fav.png?v=20260223" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260227-22" />
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body class="profile-page settings-page">
    <div class="texture"></div>

    <header class="settings-header" role="banner">
      <button id="settingsBackBtn" class="settings-back-btn" type="button" aria-label="Geri">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m15 5-7 7 7 7"></path>
        </svg>
      </button>
      <h1><a class="settings-home-link" href="index.html">Anasayfa</a></h1>
    </header>

    <form class="header-search profile-hidden-search" action="restaurant.html" method="get" role="search" aria-label="Genel arama">
      <label class="visually-hidden" for="headerSearchInput">Arama ifadesi</label>
      <input id="headerSearchInput" class="header-search-input" type="search" name="mekan" placeholder="Ne bulmamı istersin?" />
      <button class="header-search-btn" type="submit">Ara</button>
    </form>

    <main class="settings-shell">
      <section class="settings-card settings-account-card">
        <div class="settings-account-head">
          <div class="settings-avatar" id="settingsAvatar" aria-hidden="true">M</div>
          <div>
            <h2 id="settingsName">Misafir</h2>
          </div>
        </div>
      </section>

      <section id="settingsSignupCard" class="settings-card settings-signup-card is-hidden" aria-label="Kayıt ol">
        <div class="settings-signup-head">
          <h2>Kayıt ol</h2>
          <p>Hesabını oluştur ve ayarlarını kaydet.</p>
        </div>
        <form id="settingsSignupForm" class="settings-signup-form" novalidate>
          <label class="settings-signup-field">
            <span>Ad Soyad</span>
            <input id="settingsSignupName" type="text" name="name" autocomplete="name" required />
          </label>
          <label class="settings-signup-field">
            <span>E-posta</span>
            <input id="settingsSignupEmail" type="email" name="email" autocomplete="email" required />
          </label>
          <label class="settings-signup-field">
            <span>Şifre</span>
            <input id="settingsSignupPassword" type="password" name="password" autocomplete="new-password" minlength="6" required />
          </label>
          <label class="settings-signup-field">
            <span>Şifre tekrar</span>
            <input
              id="settingsSignupPasswordRepeat"
              type="password"
              name="password_repeat"
              autocomplete="new-password"
              minlength="6"
              required
            />
          </label>
          <p id="settingsSignupMessage" class="settings-signup-message" aria-live="polite"></p>
          <button class="settings-signup-submit" type="submit">Kayıt ol</button>
        </form>
      </section>

      <section class="settings-card settings-menu-card">
        <a class="settings-row" href="#" aria-label="Hesap">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="8.2" r="3.3"></circle>
              <path d="M5 18.5c1-3 3.5-4.8 7-4.8s6 1.8 7 4.8"></path>
            </svg>
          </span>
          <span class="settings-row-label">Hesap</span>
          <span class="settings-row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m9 5 7 7-7 7"></path>
            </svg>
          </span>
        </a>

        <a class="settings-row" href="#" aria-label="Gizlilik ve güvenlik">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5" y="10" width="14" height="10" rx="2"></rect>
              <path d="M8 10V7.8A4 4 0 0 1 12 4a4 4 0 0 1 4 3.8V10"></path>
            </svg>
          </span>
          <span class="settings-row-label">Gizlilik ve güvenlik</span>
          <span class="settings-row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m9 5 7 7-7 7"></path>
            </svg>
          </span>
        </a>

        <a class="settings-row" href="#" aria-label="Bildirimler">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 4.3c3 0 5.2 2.2 5.2 5.4v2.9l1.8 2.4v1H5v-1l1.8-2.4V9.7c0-3.2 2.2-5.4 5.2-5.4z"></path>
              <path d="M9.7 18.1c.3 1.1 1.2 1.8 2.3 1.8s2-.7 2.3-1.8"></path>
            </svg>
          </span>
          <span class="settings-row-label">Bildirimler</span>
          <span class="settings-row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">

          </span>
        </a>

        <a class="settings-row" href="#" aria-label="İçerik ve medya">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="5" width="16" height="14" rx="2"></rect>
              <path d="M4 10h16"></path>
            </svg>
          </span>
          <span class="settings-row-label">İçerik ve medya</span>
          <span class="settings-row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m9 5 7 7-7 7"></path>
            </svg>
          </span>
        </a>

        <a class="settings-row" href="#" aria-label="Erişilebilirlik">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="5" r="2"></circle>
              <path d="M6 9h12"></path>
              <path d="M12 9v10"></path>
              <path d="m8.8 19 3.2-4 3.2 4"></path>

          </span>

          <span class="settings-row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">

            </svg>
          </span>
        </a>

        <a class="settings-row" href="#" aria-label="Diller">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="8"></circle>
              <path d="M4.4 12h15.2"></path>
              <path d="M12 4.4a11.8 11.8 0 0 1 0 15.2"></path>
              <path d="M12 4.4a11.8 11.8 0 0 0 0 15.2"></path>
            </svg>
          </span>
          <span class="settings-row-label">Diller</span>
          <span class="settings-row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m9 5 7 7-7 7"></path>
            </svg>
          </span>
        </a>

        <a class="settings-row" href="#" aria-label="Yardım">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="8"></circle>
              <path d="M9.8 9.7a2.5 2.5 0 0 1 4.4 1.6c0 1.8-2.2 2.1-2.2 3.5"></path>
              <path d="M12 17h.1"></path>
            </svg>
          </span>
          <span class="settings-row-label">Yardım</span>
          <span class="settings-row-chevron" aria-hidden="true">

          </span>
        </a>

        <a class="settings-row" href="#" aria-label="Hakkında">
          <span class="settings-row-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <rect x="5" y="4" width="14" height="16" rx="2"></rect>
              <path d="M12 8h.1"></path>
              <path d="M10.9 12H12v3"></path>
            </svg>
          </span>
          <span class="settings-row-label">Hakkında</span>
          <span class="settings-row-chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="m9 5 7 7-7 7"></path>
            </svg>
          </span>
        </a>
      </section>

      <button id="settingsSignOutBtn" class="settings-signout" type="button">Çıkış yap</button>
    </main>

    <script src="header-search.js?v=20260227-18"></script>
    <script src="profile.js"></script>
  </body>
</html>
